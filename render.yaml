# Render blueprint — deploy this repo as one always-on web service.
# Render injects PORT and RENDER_EXTERNAL_URL automatically; the server uses
# RENDER_EXTERNAL_URL for the QR/voter link, so no manual URL config is needed.
services:
  - type: web
    name: qr-poll
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      # Postgres connection string (e.g. a Neon database). When set, votes,
      # sessions and the poll config persist across restarts/redeploys. Leave
      # unset to run purely in-memory. Set the value in the Render dashboard
      # (Environment tab) — it's a secret, so it's not stored in the repo.
      - key: DATABASE_URL
        sync: false
