# Render blueprint — deploy this repo as one always-on web service.
# Render injects PORT and RENDER_EXTERNAL_URL automatically; the server uses
# RENDER_EXTERNAL_URL for the QR/voter link, so no manual URL config is needed.
services:
  - type: web
    name: qr-poll
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    # No auth env vars — the app runs without a passcode (internal tool).
