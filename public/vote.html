<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <title>Vote</title>
  <link rel="icon" href="/logo.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="vote-wrap">
    <div class="vote-head">
      <img class="logo" id="logo" src="/logo.svg" alt="Logo" />
      <div class="head-right">
        <span class="pill" id="status"><span class="dot"></span><span id="statusText">…</span></span>
        <span class="viewers hidden" id="viewers" title="People viewing right now">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          <span id="viewerCount">0</span>
        </span>
      </div>
    </div>

    <!-- Voting view -->
    <section id="voteView">
      <div class="banner closed hidden" id="closedBanner">Voting is closed. Thanks for stopping by!</div>
      <h1 class="vote-question" id="question">Loading…</h1>
      <div class="options" id="options"></div>
    </section>

    <!-- Confirmation view (F2: one tap → confirmation) -->
    <section id="thanksView" class="thanks hidden">
      <div class="check">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h2>Thanks! Vote counted.</h2>
      <p>You voted for <span class="your-pick" id="pick"></span></p>
      <button type="button" class="btn ghost change-link" id="changeBtn">Change my vote</button>
    </section>

    <!-- Already voted → offer to cancel and vote again -->
    <section id="revoteView" class="thanks hidden">
      <div class="check info">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/></svg>
      </div>
      <h2>You've already voted</h2>
      <p>Your vote: <span class="your-pick" id="revotePick"></span></p>
      <p class="revote-q">Would you like to cancel it and vote again?</p>
      <div class="revote-actions">
        <button type="button" class="btn primary" id="revoteYes">Yes, vote again</button>
        <button type="button" class="btn ghost" id="revoteNo">No, keep my vote</button>
      </div>
      <p class="revote-note hidden" id="revoteNote"></p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/vote.js"></script>
</body>
</html>
